# Configuration Kubernetes pour déploiement cloud

apiVersion: v1
kind: Namespace
metadata:
  name: instagram-analytics
  labels:
    name: instagram-analytics

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: instagram-analytics-config
  namespace: instagram-analytics
data:
  ENVIRONMENT: "production"
  STREAMLIT_SERVER_PORT: "8501"
  STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
  STREAMLIT_SERVER_HEADLESS: "true"
  STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
  LOG_LEVEL: "INFO"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: instagram-data-pvc
  namespace: instagram-analytics
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: instagram-cache-pvc
  namespace: instagram-analytics
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: instagram-analytics
  namespace: instagram-analytics
  labels:
    app: instagram-analytics
spec:
  replicas: 3
  selector:
    matchLabels:
      app: instagram-analytics
  template:
    metadata:
      labels:
        app: instagram-analytics
    spec:
      containers:
      - name: instagram-analytics
        image: instagram-analytics:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8501
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: instagram-analytics-config
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        volumeMounts:
        - name: instagram-data
          mountPath: /app/instagram_data
        - name: instagram-cache
          mountPath: /app/.cache
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: instagram-data
        persistentVolumeClaim:
          claimName: instagram-data-pvc
      - name: instagram-cache
        persistentVolumeClaim:
          claimName: instagram-cache-pvc
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

---
apiVersion: v1
kind: Service
metadata:
  name: instagram-analytics-service
  namespace: instagram-analytics
  labels:
    app: instagram-analytics
spec:
  type: LoadBalancer
  selector:
    app: instagram-analytics
  ports:
  - name: http
    port: 80
    targetPort: 8501
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: instagram-analytics-hpa
  namespace: instagram-analytics
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: instagram-analytics
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: instagram-analytics-ingress
  namespace: instagram-analytics
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - analytics.yourdomain.com
    secretName: instagram-analytics-tls
  rules:
  - host: analytics.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: instagram-analytics-service
            port:
              number: 80
