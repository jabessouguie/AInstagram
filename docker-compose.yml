# Docker Compose - Configuration de développement

version: '3.8'

services:
  instagram-analytics:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: instagram-analytics-dev
    ports:
      - "8501:8501"
    volumes:
      - ./instagram_data:/app/instagram_data
      - ./.cache:/app/.cache
      - ./logs:/app/logs
      - ./src:/app/src  # Hot reload en dev
      - ./dashboard.py:/app/dashboard.py
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - STREAMLIT_SERVER_RUN_ON_SAVE=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - instagram-net

networks:
  instagram-net:
    driver: bridge
